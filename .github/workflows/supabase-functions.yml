name: Deploy Supabase Edge Functions

on:
  push:
    branches: ['main']
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_ID: ocvnwdbsekwjtzzfzyti
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure Supabase function secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          SYNC_FUND_TOPIC_SECRET: ${{ secrets.SYNC_FUND_TOPIC_SECRET || '' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN repository secret"
            exit 1
          fi
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -n "$SYNC_FUND_TOPIC_SECRET" ]; then
            supabase secrets set \
              SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
              SYNC_FUND_TOPIC_SECRET="$SYNC_FUND_TOPIC_SECRET" \
              --project-ref "$SUPABASE_PROJECT_ID"
          else
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY or SYNC_FUND_TOPIC_SECRET is missing; sync-fund-topic will not be usable yet."
          fi

      - name: Deploy fund valuation ranking
        run: supabase functions deploy fund-valuation-ranking --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy fund topic sync
        run: supabase functions deploy sync-fund-topic --project-ref "$SUPABASE_PROJECT_ID"
